<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>五子棋 - Gomoku</title>
<link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body>
<div id="app">
  <!-- 顶部信息栏 -->
  <div id="infoBar">
    <span>执棋：<strong id="currentTurn">黑棋</strong></span>
    <span>|</span>
    <span id="gameStatus">对局中</span>
    <span>|</span>
    <span id="timerBar" style="display:none;">⏱ 30s</span>
    <span id="aiHint"></span>
    <span id="rulesToggle" style="cursor:pointer;color:#FFD700;margin-left:8px;" title="规则说明">ⓘ 玩法</span>
  </div>
  <!-- 规则展开行 -->
  <div id="rulesRow" style="display:none;">
    <span id="rulesText">轮流落子，先五连者胜。认输=对方胜，和棋=平局。联机：一方创建房间记下房号→另一方输入房号加入→配对后执黑先行。</span>
  </div>

  <div id="mainArea">
    <canvas id="gameCanvas"></canvas>

    <!-- 模式选择弹窗（覆盖棋盘） -->
    <div id="modeModal" style="display:none;">
      <div id="modeModalBg"></div>
      <div id="modeModalBox">
        <div id="modeModalTitle">选择模式</div>
        <button id="modeSelectPvp" class="btn-mode-select">👥 双人对战</button>
        <button id="modeSelectAi" class="btn-mode-select">🤖 人机对战</button>
        <button id="modeSelectOnline" class="btn-mode-select">🌐 联机对战</button>
        <button id="modeModalCancel" class="btn-mode-cancel">取消</button>
      </div>
    </div>

    <!-- 再来一局弹窗 -->
    <div id="rematchModal" style="display:none;">
      <div id="rematchModalBg"></div>
      <div id="rematchModalBox">
        <div id="rematchModalTitle">对手邀请再来一局</div>
        <button id="rematchAccept" class="btn-blue">同意</button>
        <button id="rematchReject" class="btn-red">拒绝</button>
      </div>
    </div>

    <div id="sidePanel">
      <!-- 模式按钮 -->
      <button class="btn-blue" id="btnMode" style="width:120px;">模式</button>
      <span id="modeLabel" style="color:#FFECB3;font-size:12px;">人机对战</span>

      <!-- 联机面板 -->
      <div id="onlinePanel" style="display:none;flex-direction:column;align-items:center;gap:6px;width:120px;">
        <button class="btn-blue" id="btnCreateRoom">创建房间</button>
        <input id="roomInput" type="number" min="1000" max="9999" placeholder="4位房间号">
        <button class="btn-blue" id="btnJoinRoom">加入房间</button>
        <div id="roomInfo" style="font-size:11px;color:#FFECB3;"></div>
      </div>

      <!-- AI面板 -->
      <div id="aiPanel">
        <div style="font-weight:bold;">难度</div>
        <select id="aiLevel">
          <option value="0">入门</option><option value="1">简单</option>
          <option value="2" selected>普通</option><option value="3">困难</option><option value="4">大师</option>
        </select>
        <button class="btn-blue" id="restartBtn">重新开局</button>
      </div>

      <!-- 操作按钮 -->
      <div style="font-weight:bold;">操作</div>
      <button class="btn-red" id="btnSurrender">认输</button>
      <button class="btn-orange" id="btnDraw">申请和棋</button>
      <button class="btn-blue" id="btnUndo">悔棋</button>

      <!-- 再来一局（联机对局结束后显示） -->
      <button class="btn-blue" id="btnRematch" style="display:none;">再来一局</button>

      <!-- 战绩 -->
      <div id="statsBar"></div>

      <!-- 反馈留言 -->
      <div id="feedbackSection">
        <div style="font-weight:bold;color:#FFECB3;margin-top:8px;">反馈</div>
        <textarea id="feedbackInput" placeholder="意见或建议..." rows="2"></textarea>
        <button class="btn-blue" id="btnFeedback" style="width:120px;padding:6px 0;font-size:11px;">发送反馈</button>
        <div id="feedbackHint" style="font-size:10px;color:#FFECB3;display:none;"></div>
      </div>
    </div>
  </div>
</div>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
