<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>五子棋 - Gomoku</title>
<link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body>
<div id="app">
  <div id="infoBar">
    <span>执棋：<strong id="currentTurn">黑棋</strong></span>
    <span>|</span>
    <span id="gameStatus">对局中</span>
    <span>|</span>
    <span id="timerBar" style="display:none;">⏱ 30s</span>
    <span id="aiHint"></span>
  </div>
  <div id="mainArea">
    <canvas id="gameCanvas"></canvas>
    <div id="sidePanel">
      <div style="font-weight:bold;">模式</div>
      <label><input type="radio" name="mode" value="pvp" id="modePvp"> 双人</label>
      <label><input type="radio" name="mode" value="ai" id="modeAi" checked> 人机</label>
      <label><input type="radio" name="mode" value="online" id="modeOnline"> 联机</label>
      <div id="onlinePanel" style="display:none;flex-direction:column;align-items:center;gap:6px;width:120px;">
        <button class="btn-blue" id="btnCreateRoom">创建房间</button>
        <input id="roomInput" type="number" min="1000" max="9999" placeholder="4位房间号">
        <button class="btn-blue" id="btnJoinRoom">加入房间</button>
        <div id="roomInfo" style="font-size:11px;color:#FFECB3;"></div>
      </div>
      <div id="aiPanel">
        <div style="font-weight:bold;">难度</div>
        <select id="aiLevel">
          <option value="0">入门</option><option value="1">简单</option>
          <option value="2" selected>普通</option><option value="3">困难</option><option value="4">大师</option>
        </select>
        <button class="btn-blue" id="restartBtn">重新开局</button>
      </div>
      <div style="font-weight:bold;">操作</div>
      <button class="btn-red" id="btnSurrender">认输</button>
      <button class="btn-orange" id="btnDraw">申请和棋</button>
      <button class="btn-blue" id="btnUndo">悔棋</button>
      <div id="statsBar"></div>
    </div>
  </div>
</div>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
