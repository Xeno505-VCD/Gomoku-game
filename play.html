<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>五子棋 - Gomoku</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background-color: #2E1A0E;
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
  overflow-x: hidden;
}
#infoBar {
  width: 100%; height: 40px; background-color: #3E2723; color: #FFECB3;
  display: flex; align-items: center; justify-content: center; gap: 20px;
  font-size: 13px; flex-shrink: 0; flex-wrap: wrap; padding: 0 10px;
}
#infoBar span { white-space: nowrap; }
#gameCanvas { cursor: pointer; flex-shrink: 0; }
.btn-red { background-color: #E53935; }
.btn-orange { background-color: #FB8C00; }
.btn-blue { background-color: #1E88E5; }
/* 主区：棋盘左 + 面板右 */
#mainArea { display: flex; align-items: flex-start; justify-content: center; gap: 0; width: 100%; }
#sidePanel {
  display: flex; flex-direction: column; align-items: center; padding: 10px; gap: 12px;
  color: #FFECB3; font-size: 14px; flex-shrink: 0; min-width: 140px;
}
#sidePanel button {
  border: none; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: bold;
  color: #fff; border-radius: 6px; padding: 10px 0; transition: transform 0.1s, opacity 0.2s;
  width: 120px; flex-shrink: 0;
}
#sidePanel button:hover:not(:disabled) { opacity: 0.9; transform: scale(1.02); }
#sidePanel button:active:not(:disabled) { transform: scale(0.96); }
#sidePanel button:disabled { background-color: #9E9E9E !important; color: #616161 !important; cursor: not-allowed; opacity: 0.7; }
#sidePanel select {
  padding: 4px 8px; border-radius: 4px; background: #5D4037; color: #FFECB3;
  border: 1px solid #8D6E63; font-size: 13px; width: 120px;
}
#sidePanel label { cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 4px; }
#statsBar { color: #FFECB3; font-size: 12px; text-align: center; line-height: 1.5; }
</style>
</head>
<body>
<div id="app">
  <div id="infoBar">
    <span>当前执棋：<strong id="currentTurn">黑棋</strong></span>
    <span>|</span>
    <span id="gameStatus">对局中</span>
    <span>|</span>
    <span id="aiHint"></span>
  </div>
<div id="mainArea">
  <canvas id="gameCanvas"></canvas>
  <div id="sidePanel">
    <div style="font-weight:bold;margin-bottom:4px;">模式</div>
    <label><input type="radio" name="mode" value="pvp" id="modePvp"> 双人对战</label>
    <label><input type="radio" name="mode" value="ai" id="modeAi" checked> 人机对战</label>
    <label><input type="radio" name="mode" value="online" id="modeOnline"> 联机对战</label>
    <div id="onlinePanel" style="display:none;flex-direction:column;align-items:center;gap:8px;width:120px;">
      <button class="btn-blue" id="btnCreateRoom" onclick="createRoom()">创建房间</button>
      <input id="roomInput" type="number" min="1000" max="9999" placeholder="输入4位房间号" style="width:120px;padding:4px;border-radius:4px;border:1px solid #8D6E63;background:#5D4037;color:#FFECB3;font-size:13px;">
      <button class="btn-blue" id="btnJoinRoom" onclick="joinRoom()">加入房间</button>
      <div id="roomInfo" style="font-size:11px;color:#FFECB3;"></div>
    </div>
    <div id="aiPanel">
    <div style="font-weight:bold;margin-top:4px;">难度</div>
    <select id="aiLevel">
      <option value="0">入门</option>
      <option value="1">简单</option>
      <option value="2" selected>普通</option>
      <option value="3">困难</option>
      <option value="4">大师</option>
    </select>
    <button class="btn-blue" onclick="restartGame()">重新开局</button>
    </div>
    <div style="font-weight:bold;margin-top:8px;">操作</div>
    <button class="btn-red" id="btnSurrender" onclick="surrender()">认输</button>
    <button class="btn-orange" id="btnDraw" onclick="requestDraw()">申请和棋</button>
    <button class="btn-blue" id="btnUndo" onclick="requestUndo()">悔棋</button>
    <div id="statsBar"></div>
  </div>
</div>
</div>
<script>
const BOARD_SIZE = 15;
const WIN_COUNT = 5;
const EMPTY = 0, BLACK = 1, WHITE = 2;

const STAR_POINTS = [
  [3,3],[3,7],[3,11],[7,3],[7,7],[7,11],[11,3],[11,7],[11,11]
];
const CENTER = [7,7];

// ===== 渲染常量 =====
const BOARD_BG = '#DEB887';
const BOARD_LINE = '#5D4037';
const STONE_BLACK = '#1a1a1a';
const STONE_BLACK_HL = '#555555';
const STONE_WHITE = '#F5F5F5';
const STONE_WHITE_BORDER = '#BDBDBD';
const STONE_WHITE_HL = '#FFFFFF';
const LAST_MARKER = '#FF5722';
const WIN_HL = '#FFD700';

// ===== 状态 =====
let board = [];
let currentPlayer = BLACK;
let gameMode = 'ai'; // 'ai' | 'pvp'
let aiLevel = 2;    // 0=入门 1=简单 2=普通 3=困难 4=大师
let status = 'PLAYING'; // PLAYING | WIN | DRAW | AI_THINKING
let lastMove = null;
let winLine = [];
let moveHistory = [];
let undoUsed = false;

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// ===== 响应式布局 =====
let W, H, boardX, boardY, cellSize, stoneR;
function calcLayout() {
  W = Math.min(window.innerWidth - 20, 900);
  H = Math.min(window.innerHeight - 160, 650);
  const usableW = W, usableH = H;
  const boardAreaW = usableW * 0.78;
  const maxBoard = Math.min(boardAreaW, usableH);
  const padding = Math.max(maxBoard * 0.05, 10);
  const boardSize = maxBoard - padding * 2;
  cellSize = boardSize / 14;
  stoneR = cellSize * 0.42;
  boardX = (W - boardSize) / 2 - cellSize;
  boardY = padding;
}
calcLayout();
canvas.width = W;
canvas.height = H;
window.addEventListener('resize', () => { calcLayout(); canvas.width = W; canvas.height = H; draw(); });

// ===== 极简AI：随机空白位，毫秒出子 =====
function aiMove() {
  const empty = [];
  for (let r = 0; r < BOARD_SIZE; r++) {
    for (let c = 0; c < BOARD_SIZE; c++) {
      if (board[r][c] === EMPTY) empty.push({ r, c });
    }
  }
  if (empty.length === 0) return { r: 7, c: 7 };
  return empty[Math.floor(Math.random() * empty.length)];
}

// ===== 游戏逻辑 =====
function initBoard() {
  board = [];
  for (let r = 0; r < BOARD_SIZE; r++) {
    board[r] = Array(BOARD_SIZE).fill(EMPTY);
  }
  currentPlayer = BLACK;
  status = 'PLAYING';
  lastMove = null;
  winLine = [];
  moveHistory = [];
  undoUsed = false;
  document.getElementById('gameStatus').textContent = '对局中';
  document.getElementById('aiHint').textContent = '';
  updateUI();
  draw();
  setButtonsEnabled(true);
}

function restartGame() {
  gameMode = document.getElementById('modeAi').checked ? 'ai' : 'pvp';
  aiLevel = parseInt(document.getElementById('aiLevel').value);
  initBoard();
}

function placeStone(row, col) {
  if (status !== 'PLAYING') return;
  if (board[row][col] !== EMPTY) return;
  board[row][col] = currentPlayer;
  moveHistory.push({ row, col, color: currentPlayer });
  lastMove = { row, col };

  const result = checkWin(row, col);
    if (result) {
    status = 'WIN';
    winLine = result.winLine;
    setButtonsEnabled(false);
    draw();
    const winner = result.winner === BLACK ? '黑棋胜利！' : '白棋胜利！';
    recordResult(result.winner === BLACK ? 'win' : 'loss');
    document.getElementById('gameStatus').textContent = winner;
    return;
  }
  if (isBoardFull()) {
    status = 'DRAW';
    setButtonsEnabled(false);
    draw();
    recordResult('draw');
    document.getElementById('gameStatus').textContent = '对局和棋！棋盘已满';
    return;
  }
  currentPlayer = currentPlayer === BLACK ? WHITE : BLACK;
  updateUI();
  draw();

  // AI回合
  if (gameMode === 'ai' && currentPlayer === WHITE && status === 'PLAYING') {
    status = 'AI_THINKING';
    document.getElementById('aiHint').textContent = 'AI思考中...';
    setTimeout(() => {
      if (status !== 'AI_THINKING') return;
      const mv = aiMove();
      if (mv) {
        placeStone(mv.r !== undefined ? mv.r : mv.row, mv.c !== undefined ? mv.c : mv.col);
      }
    }, 50);
  }
}

function checkWin(row, col) {
  const color = board[row][col];
  if (color === EMPTY) return null;
  const dirs = [[0,1],[1,0],[1,1],[1,-1]];
  for (const [dr, dc] of dirs) {
    const line = [{ row, col }];
    let r = row + dr, c = col + dc;
    while (r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE && board[r][c] === color) {
      line.push({ row: r, col: c }); r += dr; c += dc;
    }
    r = row - dr; c = col - dc;
    while (r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE && board[r][c] === color) {
      line.unshift({ row: r, col: c }); r -= dr; c -= dc;
    }
    if (line.length >= WIN_COUNT) return { winner: color, winLine: line };
  }
  return null;
}

function isBoardFull() {
  for (let r = 0; r < BOARD_SIZE; r++)
    for (let c = 0; c < BOARD_SIZE; c++)
      if (board[r][c] === EMPTY) return false;
  return true;
}

function surrender() {
  if (status !== 'PLAYING' && status !== 'AI_THINKING') return;
  status = 'DRAW';
  setButtonsEnabled(false);
  recordResult('loss');
  document.getElementById('gameStatus').textContent = currentPlayer === BLACK ? '黑棋认输，白棋胜！' : '白棋认输，黑棋胜！';
  draw();
}

function requestDraw() {
  if (status !== 'PLAYING' && status !== 'AI_THINKING') return;
  if (gameMode === 'ai') {
    // AI自动同意和棋
    status = 'DRAW';
    setButtonsEnabled(false);
    recordResult('draw');
    document.getElementById('gameStatus').textContent = '对局和棋！';
    draw();
  } else {
    // 本地双人模式：简化处理，直接确认
    if (confirm('确定和棋？')) {
      status = 'DRAW';
      setButtonsEnabled(false);
      recordResult('draw');
      document.getElementById('gameStatus').textContent = '对局和棋！';
      draw();
    }
  }
}

function requestUndo() {
  if (gameMode === 'ai') {
    // 人机模式：撤回两步（玩家+AI）
    if (moveHistory.length < (undoUsed ? 2 : 2)) return;
    if (status !== 'PLAYING' && status !== 'AI_THINKING') return;
    for (let i = 0; i < 2; i++) {
      const step = moveHistory.pop();
      if (step) board[step.row][step.col] = EMPTY;
    }
    undoUsed = true;
    currentPlayer = BLACK;
    lastMove = moveHistory.length > 0 ? moveHistory[moveHistory.length - 1] : null;
    winLine = [];
    status = 'PLAYING';
    document.getElementById('gameStatus').textContent = '对局中';
    updateUI();
    draw();
  } else {
    // 本地双人：撤回一步
    if (moveHistory.length < 1) return;
    const step = moveHistory.pop();
    board[step.row][step.col] = EMPTY;
    currentPlayer = step.color;
    lastMove = moveHistory.length > 0 ? moveHistory[moveHistory.length - 1] : null;
    winLine = [];
    status = 'PLAYING';
    document.getElementById('gameStatus').textContent = '对局中';
    updateUI();
    draw();
  }
}

function setButtonsEnabled(enabled) {
  document.getElementById('btnSurrender').disabled = !enabled;
  document.getElementById('btnDraw').disabled = !enabled;
  document.getElementById('btnUndo').disabled = !enabled;
}

function updateUI() {
  document.getElementById('currentTurn').textContent = currentPlayer === BLACK ? '黑棋' : '白棋';
}

// ===== 战绩统计 (localStorage) =====
function loadStats() {
  try { return JSON.parse(localStorage.getItem('gomoku_stats')) || { total:0, wins:0, losses:0, draws:0, streak:0, maxStreak:0 }; }
  catch(e) { return { total:0, wins:0, losses:0, draws:0, streak:0, maxStreak:0 }; }
}
function saveStats(st) {
  try { localStorage.setItem('gomoku_stats', JSON.stringify(st)); } catch(e) {}
}
function recordResult(type) {
  const st = loadStats();
  st.total++;
  if (type === 'win')  { st.wins++; st.streak++; st.maxStreak = Math.max(st.maxStreak, st.streak); }
  if (type === 'loss') { st.losses++; st.streak = 0; }
  if (type === 'draw') { st.draws++; /* streak unchanged */ }
  saveStats(st);
  const el = document.getElementById('statsBar');
  if (el) el.textContent = `总局:${st.total} 胜:${st.wins} 负:${st.losses} 和:${st.draws} | 连胜:${st.streak}(${st.maxStreak}场最佳)`;
}
// 页面加载时显示
(function(){ const st=loadStats(); const el=document.getElementById('statsBar'); if(el)el.textContent=`总局:${st.total} 胜:${st.wins} 负:${st.losses} 和:${st.draws} | 连胜:${st.streak}(${st.maxStreak}场最佳)`; })();

// ===== Canvas 渲染 =====
function getPX(col) { return boardX + col * cellSize; }
function getPY(row) { return boardY + row * cellSize; }

function draw() {
  ctx.clearRect(0, 0, W, H);
  const bps = cellSize * 14;
  ctx.fillStyle = BOARD_BG;
  ctx.fillRect(boardX - cellSize * 0.5, boardY - cellSize * 0.5, bps + cellSize, bps + cellSize);
  ctx.strokeStyle = BOARD_LINE; ctx.lineWidth = 1;
  for (let i = 0; i < BOARD_SIZE; i++) {
    const x = getPX(i), y = getPY(i);
    ctx.beginPath(); ctx.moveTo(getPX(0), y); ctx.lineTo(getPX(14), y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x, getPY(0)); ctx.lineTo(x, getPY(14)); ctx.stroke();
  }
  ctx.fillStyle = BOARD_LINE;
  for (const [r, c] of STAR_POINTS) {
    ctx.beginPath(); ctx.arc(getPX(c), getPY(r), Math.max(2, cellSize * 0.08), 0, Math.PI * 2); ctx.fill();
  }
  for (let r = 0; r < BOARD_SIZE; r++) {
    for (let c = 0; c < BOARD_SIZE; c++) {
      if (board[r][c] === EMPTY) continue;
      drawStone(r, c, board[r][c]);
    }
  }
  if (lastMove) {
    ctx.fillStyle = LAST_MARKER;
    ctx.beginPath(); ctx.arc(getPX(lastMove.col), getPY(lastMove.row), stoneR * 0.25, 0, Math.PI * 2); ctx.fill();
  }
  if (winLine.length > 0) {
    ctx.save(); ctx.fillStyle = WIN_HL; ctx.globalAlpha = 0.5;
    for (const p of winLine) {
      ctx.beginPath(); ctx.arc(getPX(p.col), getPY(p.row), stoneR + 2, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
  }
}

function drawStone(row, col, color) {
  const x = getPX(col), y = getPY(row);
  ctx.save();
  if (color === BLACK) {
    const g = ctx.createRadialGradient(x - stoneR * 0.3, y - stoneR * 0.3, stoneR * 0.1, x, y, stoneR);
    g.addColorStop(0, STONE_BLACK_HL); g.addColorStop(1, STONE_BLACK); ctx.fillStyle = g;
  } else {
    const g = ctx.createRadialGradient(x - stoneR * 0.3, y - stoneR * 0.3, stoneR * 0.1, x, y, stoneR);
    g.addColorStop(0, STONE_WHITE_HL); g.addColorStop(1, '#D6D6D6'); ctx.fillStyle = g;
  }
  ctx.beginPath(); ctx.arc(x, y, stoneR, 0, Math.PI * 2); ctx.fill();
  if (color === WHITE) {
    ctx.strokeStyle = STONE_WHITE_BORDER; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(x, y, stoneR, 0, Math.PI * 2); ctx.stroke();
  }
  ctx.restore();
}

// ===== 输入处理 =====
canvas.addEventListener('click', (e) => {
  if (status !== 'PLAYING') return;
  const rect = canvas.getBoundingClientRect();
  const sx = canvas.width / rect.width, sy = canvas.height / rect.height;
  const px = (e.clientX - rect.left) * sx, py = (e.clientY - rect.top) * sy;
  const col = Math.round((px - boardX) / cellSize);
  const row = Math.round((py - boardY) / cellSize);
  if (row < 0 || row >= BOARD_SIZE || col < 0 || col >= BOARD_SIZE) return;
  const hx = boardX + col * cellSize, hy = boardY + row * cellSize;
  if (Math.sqrt((px - hx) ** 2 + (py - hy) ** 2) > cellSize * 0.45) return;
  // 人机模式仅黑棋可操作
  if (gameMode === 'ai' && currentPlayer !== BLACK) return;
  placeStone(row, col);
});

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (status !== 'PLAYING') return;
  if (e.touches.length > 1) return;
  const t = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const sx = canvas.width / rect.width, sy = canvas.height / rect.height;
  const px = (t.clientX - rect.left) * sx, py = (t.clientY - rect.top) * sy;
  const col = Math.round((px - boardX) / cellSize);
  const row = Math.round((py - boardY) / cellSize);
  if (row < 0 || row >= BOARD_SIZE || col < 0 || col >= BOARD_SIZE) return;
  const hx = boardX + col * cellSize, hy = boardY + row * cellSize;
  if (Math.sqrt((px - hx) ** 2 + (py - hy) ** 2) > cellSize * 0.45) return;
  if (gameMode === 'ai' && currentPlayer !== BLACK) return;
  placeStone(row, col);
}, { passive: false });

// ===== 联机模式 WebSocket =====
let ws = null;
let onlineRoom = '';
let myColor = 0;
const WS_URL = 'https://gomoku-ws.YOUR_SUBDOMAIN.workers.dev'; // 部署后替换

document.getElementById('modeOnline').addEventListener('change', () => {
  gameMode = 'online';
  document.getElementById('onlinePanel').style.display = 'flex';
  document.getElementById('aiPanel').style.display = 'none';
  initBoard();
});

document.getElementById('modeAi').addEventListener('change', () => {
  gameMode = 'ai';
  document.getElementById('onlinePanel').style.display = 'none';
  document.getElementById('aiPanel').style.display = 'block';
  if (ws) { ws.close(); ws = null; }
  restartGame();
});
document.getElementById('modePvp').addEventListener('change', () => {
  gameMode = 'pvp';
  document.getElementById('onlinePanel').style.display = 'none';
  document.getElementById('aiPanel').style.display = 'block';
  if (ws) { ws.close(); ws = null; }
  restartGame();
});
document.getElementById('aiLevel').addEventListener('change', () => { restartGame(); });

async function createRoom() {
  try {
    const res = await fetch(WS_URL + '/create');
    const data = await res.json();
    onlineRoom = data.roomId;
    connectWS(onlineRoom);
    document.getElementById('roomInfo').textContent = '房间号: ' + onlineRoom;
  } catch(e) {
    document.getElementById('roomInfo').textContent = '创建失败，检查网络';
  }
}

function joinRoom() {
  onlineRoom = document.getElementById('roomInput').value;
  if (!onlineRoom || onlineRoom < 1000 || onlineRoom > 9999) {
    alert('请输入4位房间号'); return;
  }
  connectWS(onlineRoom);
}

function connectWS(room) {
  if (ws) ws.close();
  const wsUrl = WS_URL.replace('https', 'wss') + '/join?room=' + room;
  ws = new WebSocket(wsUrl);
  ws.onopen = () => { document.getElementById('roomInfo').textContent = '已连接 房间:' + room; };
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    switch (msg.type) {
      case 'ASSIGN':
        myColor = msg.color;
        document.getElementById('aiHint').textContent = myColor === 1 ? '你执黑棋' : '你执白棋';
        break;
      case 'WAITING':
        document.getElementById('aiHint').textContent = msg.msg;
        break;
      case 'GAME_START':
        document.getElementById('aiHint').textContent = '对局开始！';
        initBoard();
        currentPlayer = BLACK;
        updateUI();
        break;
      case 'MOVE':
        board[msg.row][msg.col] = msg.color;
        lastMove = { row: msg.row, col: msg.col };
        currentPlayer = msg.currentPlayer;
        updateUI();
        draw();
        break;
      case 'GAME_OVER':
        status = msg.winner ? 'WIN' : 'DRAW';
        winLine = msg.winLine || [];
        setButtonsEnabled(false);
        draw();
        document.getElementById('gameStatus').textContent =
          msg.winner ? (msg.winner === myColor ? '你赢了！' : '你输了！') : '对局和棋！';
        recordResult(msg.winner ? (msg.winner === myColor ? 'win' : 'loss') : 'draw');
        break;
      case 'DRAW_REQUEST':
        if (confirm('对手申请和棋，同意？')) {
          ws.send(JSON.stringify({ type: 'DRAW_RESPONSE', accept: true }));
        } else {
          ws.send(JSON.stringify({ type: 'DRAW_RESPONSE', accept: false }));
        }
        break;
      case 'DRAW_REJECTED':
        document.getElementById('aiHint').textContent = '对手拒绝和棋';
        break;
      case 'UNDO_REQUEST':
        if (confirm('对手申请悔棋，同意？')) {
          ws.send(JSON.stringify({ type: 'UNDO_RESPONSE', accept: true }));
        } else {
          ws.send(JSON.stringify({ type: 'UNDO_RESPONSE', accept: false }));
        }
        break;
      case 'UNDO_REJECTED':
        document.getElementById('aiHint').textContent = '对手拒绝悔棋';
        break;
      case 'UNDO_EXECUTED':
        board = msg.state.board;
        currentPlayer = msg.state.currentPlayer;
        lastMove = msg.state.moves.length > 0 ? msg.state.moves[msg.state.moves.length-1] : null;
        status = msg.state.status;
        document.getElementById('gameStatus').textContent = '对局中';
        updateUI();
        draw();
        break;
      case 'OPPONENT_LEFT':
        document.getElementById('aiHint').textContent = '对手已离开';
        break;
    }
  };
  ws.onclose = () => { document.getElementById('aiHint').textContent = '连接已断开'; };
}

// 覆写联机模式的落子
const origPlaceStone = placeStone;
placeStone = function(row, col) {
  if (gameMode === 'online') {
    if (status !== 'PLAYING') return;
    if (currentPlayer !== myColor) return;
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'MOVE', row, col }));
    }
    board[row][col] = currentPlayer;
    moveHistory.push({ row, col, color: currentPlayer });
    lastMove = { row, col };
    currentPlayer = currentPlayer === BLACK ? WHITE : BLACK;
    updateUI();
    draw();
    return;
  }
  return origPlaceStone(row, col);
};

// 覆写联机模式的和棋/悔棋/认输
const origDraw = requestDraw;
requestDraw = function() {
  if (gameMode === 'online' && ws) {
    ws.send(JSON.stringify({ type: 'DRAW_REQUEST' }));
    return;
  }
  return origDraw();
};

const origUndo = requestUndo;
requestUndo = function() {
  if (gameMode === 'online' && ws) {
    ws.send(JSON.stringify({ type: 'UNDO_REQUEST' }));
    return;
  }
  return origUndo();
};

const origSurrender = surrender;
surrender = function() {
  if (gameMode === 'online') {
    if (ws) ws.send(JSON.stringify({ type: 'SURRENDER' }));
    status = 'DRAW';
    setButtonsEnabled(false);
    document.getElementById('gameStatus').textContent = '你认输了！';
    draw();
    return;
  }
  return origSurrender();
};

// 启动
restartGame();
</script>
